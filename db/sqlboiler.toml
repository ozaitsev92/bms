[psql]
  dbname    = "bms"
  host      = "localhost"
  port      = 5432
  user      = "postgres"
  pass      = "postgres"
  sslmode   = "disable"
  blacklist = ["schema_migrations"]

[generation]
  output               = "models"
  pkgname              = "models"
  add-global-variants  = false
  add-panic-variants   = false
  no-tests             = false
  wipe                 = true
  struct-tag-casing    = "snake"
  tag-ignore           = []